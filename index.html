<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, 
                maximum-scale=1.0, user-scalable=no">
    <title>Taxi Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>


<body>
    <div class="content">
        <div class="top-section">
            <h2>Сума: <span id="totalDisplay">0</span></h2>
            <h2>Замовлень: <span id="totalOrderDisplay">0</span></h2>
            <button class="reset-button" onclick="ResetTotal()" style="background-color: #555;">
                Скинути</button>
            <button class="reset-last-button" onclick="ResetLastOrder()" 
                style="background-color: #805a5a;">Відняти останнє замовлення</button>
        </div>
        <div class="bottom-section">
            <div class="basic-number">
                <button type="button" onclick="AddToTotal(100)">100</button>
                <button type="button" onclick="AddToTotal(120)">120</button>
                <button type="button" onclick="AddToTotal(130)">130</button>
                <button type="button" onclick="AddToTotal(140)">140</button>
                <button type="button" onclick="AddToTotal(150)">150</button>
                <button type="button" onclick="AddToTotal(170)">170</button>
                <button type="button" onclick="AddToTotal(200)">200</button>
                <button type="button" onclick="AddToTotal(250)">250</button>
                <button type="button" onclick="AddToTotal(300)">300</button>
            </div>

            <div class="custom-number">
                <input type="number" inputmode="decimal" id="customValue" placeholder="Своє число">
                <button type="button" class="add-button" onclick="AddCustomValue()">Додати</button>
            </div>
        </div>

    </div>
</body>

</html>
